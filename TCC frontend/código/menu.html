<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC Dashboard</title>
    <link rel="stylesheet" href="css/stylesmenu.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="imagens/Logosasc.png" alt="SASC Logo" class="main-logo" width="70">
                    
                </div>
            </div>

            <nav class="nav-menu">
                <div class="nav-item active">
                    <div class="nav-icon">🏠</div>
                    <span>menu</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">📊</div>
                    <span>análises</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">⚙️</div>
                    <span>setores</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">👥</div>
                    <span>respondentes</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">⚠️</div>
                    <span>alertas</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">📋</div>
                    <span>relatórios</span>
                </div>
                <div class="nav-item">
                    <div class="nav-icon">🔧</div>
                    <span>configurações</span>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <header class="header">
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-icon">👤</div>
                        <span>GESTOR</span>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- CHARTS ROW -->
                <div class="dashboard-grid">
                    <!-- NPS CARD -->
                    <div class="card">
                        <h2 class="card-title">NPS:</h2>
                        <div class="chart-container">
                            <canvas id="npsChart" width="200" height="200"></canvas>
                        </div>
                    </div>

                    <!-- SATISFAÇÃO POR SETOR CARD -->
                    <div class="card">
                        <h2 class="card-title">Satisfação por setor:</h2>
                        <div class="chart-container">
                            <canvas id="satisfacaoChart" width="300" height="200"></canvas>
                        </div>
                    </div>
                </div>

                <!-- METRICS ROW -->
                <div class="metrics-row">
                    <!-- AVALIAÇÕES -->
                    <div class="metric-card">
                        <div class="metric-header">
                            <h3 class="metric-title">Avaliações</h3>
                            <div class="star-icon">⭐</div>
                        </div>
                        <div class="metric-value">1.659</div>
                    </div>

                    <!-- SATISFAÇÃO MÉDIA -->
                    <div class="metric-card">
                        <div class="metric-header">
                            <h3 class="metric-title">satisfação média</h3>
                            <div class="star-icon">⭐</div>
                        </div>
                        <div class="metric-gauge">
                            <canvas id="gaugeChart" width="150" height="80"></canvas>
                        </div>
                    </div>

                    <!-- RESPONDENTES -->
                    <div class="metric-card">
                        <div class="metric-header">
                            <h3 class="metric-title">respondentes</h3>
                            <div class="star-icon">⭐</div>
                        </div>
                        <div class="metric-value">534</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="javascript/scriptmenu.js"></script>
</body>
</html>
